version: "3.9"

x-healthcheck-defaults: &hc
  interval: 10s
  timeout: 3s
  retries: 10
  start_period: 10s

x-restart: &restart
  restart: unless-stopped

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-avrovo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-avrovo}
      POSTGRES_DB: ${POSTGRES_DB:-avrovo}
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      <<: *hc
    <<: *restart

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck: { test: ["CMD", "redis-cli", "ping"], <<: *hc }
    <<: *restart

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    <<: *restart

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on: [zookeeper]
    ports: ["9092:9092"]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      <<: *hc
    <<: *restart

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports: ["8080:8080"]
    environment:
      KAFKA_CLUSTERS_0_NAME: avrovo
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on: [kafka]
    <<: *restart

  api-gateway:
    # build: ./services/api-gateway
    build:
      context: .                                    # repo root
      dockerfile: services/api-gateway/Dockerfile
    env_file: .env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    ports: ["8000:8000"]
    depends_on:
      patient-service: { condition: service_healthy }
      auth-service: { condition: service_healthy }
      ai-engine: { condition: service_healthy }
    healthcheck: { test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"], <<: *hc }
    <<: *restart

  patient-service:
    # build: ./services/patient-service
    build:
      context: .                                    # repo root
      dockerfile: services/patient-service/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-avrovo}:${POSTGRES_PASSWORD:-avrovo}@postgres:5432/${POSTGRES_DB:-avrovo}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    ports: ["8001:8001"]
    depends_on:
      postgres: { condition: service_healthy }
      kafka: { condition: service_healthy }
    healthcheck: { test: ["CMD", "curl", "-f", "http://localhost:8001/healthz"], <<: *hc }
    <<: *restart

  ai-engine:
    # build: ./services/ai-engine
    build:
      context: .                                    # repo root
      dockerfile: services/ai-engine/Dockerfile
    env_file: .env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    ports: ["8002:8002"]
    depends_on:
      kafka: { condition: service_healthy }
    healthcheck: { test: ["CMD", "curl", "-f", "http://localhost:8002/healthz"], <<: *hc }
    <<: *restart

  auth-service:
    # build: ./services/auth-service
    build:
      context: .                                    # repo root
      dockerfile: services/auth-service/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-avrovo}:${POSTGRES_PASSWORD:-avrovo}@postgres:5432/${POSTGRES_DB:-avrovo}
    ports: ["8003:8003"]
    depends_on:
      postgres: { condition: service_healthy }
    healthcheck: { test: ["CMD", "curl", "-f", "http://localhost:8003/healthz"], <<: *hc }
    <<: *restart

  notification-service:
    # build: ./services/notification-service
    build:
      context: .                                    # repo root
      dockerfile: services/notification-service/Dockerfile
    env_file: .env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      REDIS_URL: redis://redis:6379/0
    ports: ["8004:8004"]
    depends_on:
      kafka: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck: { test: ["CMD", "curl", "-f", "http://localhost:8004/healthz"], <<: *hc }
    <<: *restart

  simulator:
    # build: ./services/simulator
    build:
      context: .                                    # repo root
      dockerfile: services/simulator/Dockerfile
    env_file: .env
    environment:
      PATIENT_SERVICE_URL: http://patient-service:8001
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      patient-service: { condition: service_healthy }
    <<: *restart

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:8000
    ports: ["3000:3000"]
    depends_on: [api-gateway]
    <<: *restart

  prometheus:
    image: prom/prometheus:latest
    volumes: ["./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro"]
    ports: ["9090:9090"]
    <<: *restart

  grafana:
    image: grafana/grafana:latest
    ports: ["3001:3000"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes: ["grafana-data:/var/lib/grafana"]
    <<: *restart

volumes:
  pgdata:
  grafana-data:
