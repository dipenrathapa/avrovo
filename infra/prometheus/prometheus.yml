global:
  scrape_interval: 10s

scrape_configs:
  - job_name: avrovo
    static_configs:
      - targets:
          - api-gateway:8000
          - patient-service:8001
          - ai-engine:8002
          - auth-service:8003
          - notification-service:8004
        labels: { app: avrovo }
    metrics_path: /metrics
